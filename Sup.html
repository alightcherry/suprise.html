<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Love 💖</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Georgia,serif;background:#0d0010;color:#fff;overflow:hidden}

/* Screens */
.screen{display:none;min-height:100vh;align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:20px}
.active{display:flex}

/* Tap Screen */
#s0{background:radial-gradient(#3a0035,#0d0010)}
.tap-btn{margin-top:20px;padding:14px 40px;border:none;border-radius:50px;background:#ff4da6;color:#fff;font-size:18px}

/* Greeting */
.greet-name{font-size:40px;color:#ff6ec7;font-weight:bold}

/* Cards */
.card{background:#ffffff10;border-radius:20px;padding:15px;margin:15px 0;width:90%;max-width:400px}
.card img{width:100%;height:220px;object-fit:cover;border-radius:15px}

/* Final */
.final-img{width:220px;height:220px;border-radius:50%;overflow:hidden;border:4px solid #ff4da6}
.final-img img{width:100%;height:100%;object-fit:cover}

/* Buttons */
button{cursor:pointer}
</style>
</head>

<body>

<!-- SCREEN 0 -->
<div id="s0" class="screen active">
  <h1>💖 Tap to Open 💖</h1>
  <button class="tap-btn" onclick="go('s1')">Open</button>
</div>

<!-- SCREEN 1 -->
<div id="s1" class="screen">
  <h2 class="greet-name">PAPA 💖</h2>
  <p>Happy Birthday my love 🎂✨</p>
  <button onclick="go('s2')">Next 💌</button>
</div>

<!-- SCREEN 2 -->
<div id="s2" class="screen">

  <div class="card">
    <img src="photo1.jpg">
    <p>You are my favorite person 💕</p>
  </div>

  <div class="card">
    <img src="photo2.jpg">
    <p>My world began with you 🌹</p>
  </div>

  <div class="card">
    <img src="photo3.jpg">
    <p>You deserve all the stars ✨</p>
  </div>

  <div class="card">
    <img src="photo4.jpg">
    <p>My heart always chooses you 💖</p>
  </div>

  <button onclick="go('s3')">Continue 💍</button>
</div>

<!-- SCREEN 3 -->
<div id="s3" class="screen">
  <h2>Will you be mine forever? 💍</h2>
  <button onclick="go('s4')">Yes 💖</button>
</div>

<!-- SCREEN 4 -->
<div id="s4" class="screen">
  <div class="final-img">
    <img src="final.jpg">
  </div>
  <h2>I Love You 💝</h2>
  <p>You are my everything 💕</p>
</div>

<script>
function go(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
</script>

</body>
</html><img width="800" height="756" alt="image" src="https://github.com/user-attachments/assets/895ef4be-b03f-44d0-a80e-b46e385a1dd2" />
